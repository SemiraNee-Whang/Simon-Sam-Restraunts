name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Simon-Sam-Restraunts

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # We remove the cache line for this run to skip the strict lockfile check
      
      - run: npm install # Use install instead of ci if the lockfile is being finicky
      
      - run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - uses: actions/upload-pages-artifact@v3
        with:
          # Tell GitHub to find the finished site inside that sub-folder
          path: Simon-Sam-Restraunts/dist
          
      - uses: actions/deploy-pages@v4
